<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>predictwin Tokenomics</title>
  <meta name="description" content="PWIN tokenomics, allocations, utility, and vesting.">
  <style>
    :root {
      --bg: #080710;
      --panel: #111021;
      --text: #f0eef8;
      --muted: #bbb1ce;
      --accent: #c084fc;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; }
    .wrap { width: min(980px, 100%); margin: 0 auto; background: var(--panel); border: 1px solid rgba(192,132,252,0.2); border-radius: 16px; padding: 26px; }
    h1 { margin: 0 0 10px; font-size: clamp(25px, 4vw, 38px); }
    p { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; }
    .pct { color: var(--accent); font-size: 22px; font-weight: 800; }
    .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 620px) { body { padding: 12px; } .wrap { padding: 16px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>PWIN Tokenomics</h1>
    <p>This is a clean responsive starter for <strong>/tokonomics.html</strong>. Replace values/content with your final tokenomics table.</p>
    <section class="grid">
      <article class="card"><div class="pct">40%</div><div class="label">Public Sale</div></article>
      <article class="card"><div class="pct">20%</div><div class="label">Ecosystem</div></article>
      <article class="card"><div class="pct">15%</div><div class="label">Team</div></article>
      <article class="card"><div class="pct">10%</div><div class="label">Reserve</div></article>
      <article class="card"><div class="pct">10%</div><div class="label">Advisors</div></article>
      <article class="card"><div class="pct">5%</div><div class="label">Airdrop</div></article>
    </section>
  </main>
</body>
</html>
